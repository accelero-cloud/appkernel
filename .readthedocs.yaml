# Read the Docs configuration file
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  # Trigger a new build on every push to these branches.
  # The GitHub webhook (configured under Admin → Integrations in the RTD
  # project) delivers push events; this list controls which branches are
  # actually built.
  jobs:
    post_checkout:
      - git fetch --unshallow || true   # ensures full history for changelog tools

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
